name: Daily Briefing

on:
  schedule:
    - cron: '0 22 * * *'  # 한국시간 매일 오전 7시 (UTC 22:00)
  workflow_dispatch:  # 수동 실행 버튼

jobs:
  run-briefing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install feedparser openai requests

      - name: Run briefing script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python briefing.py

      - name: Upload HTML to repository
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Actions"
          git add briefing_*.html
          git commit -m "Add daily briefing $(date +'%Y%m%d')" || echo "Nothing to commit"
          git push
